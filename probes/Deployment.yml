apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-probes-demo

spec:
  replicas: 1
apiVersion: v1
kind: Pod
metadata:
  name: nginx-startup-readiness
  labels:
    app: nginx-startup-readiness

spec:
  containers:
  - name: nginx
    image: nginx:latest
    command: ["sh", "-c", "sleep 40 && nginx -g 'daemon off;'"]

    ports:
    - containerPort: 80

    startupProbe:
      httpGet:
        path: /
        port: 80
      failureThreshold: 10
      periodSeconds: 5

    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 5

    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 10
      periodSeconds: 10
      failureThreshold: 3
  selector:
    matchLabels:
      app: python-probes-demo

  template:
    metadata:
      labels:
        app: python-probes-demo

    spec:
      containers:
      - name: python-app
        image: 426192960096.dkr.ecr.us-east-1.amazonaws.com/argocdapplication:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 8080
        
        # Startup probe: checks if app is initialized
        startupProbe:
          httpGet:
            path: /readyiii
            port: 8080
          failureThreshold: 3
          periodSeconds: 5
          # Liveness probe: checks if app is alive

        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
          # Readiness probe: checks if app is ready for traffic

        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          periodSeconds: 5
          failureThreshold: 3
