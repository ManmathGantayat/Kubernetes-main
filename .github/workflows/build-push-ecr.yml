name: Build and Push Image to ECR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker Image
        run: |
          docker build -t argocdapplication ./probes

      - name: Tag Image
        run: |
          docker tag argocdapplication:latest 426192960096.dkr.ecr.us-east-1.amazonaws.com/argocdapplication:latest

      - name: Push Image to ECR
        run: |
          docker push 426192960096.dkr.ecr.us-east-1.amazonaws.com/argocdapplication:latest
